name: Evals
on:
  pull_request:
  workflow_dispatch:   # manual runs from the Actions tab

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install full stack (evals embed the corpus locally)
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e .
      - name: Build index from corpus
        run: python -m ingestion.ingest ./docs
        working-directory: .
        env:
          PYTHONPATH: backend
      - name: "Run evals (gates: faithfulness >= 0.75, refusal >= 2/3)"
        run: python evals/run.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: evals/report.md
